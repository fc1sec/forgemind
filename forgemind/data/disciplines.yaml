        escalate_to: ML Engineer

  operations_methodops:
    name: Operations & MethodOps
    description: Process design, flow management, and operational improvement methods.
    domains:

      lean:
        name: Lean Manufacturing / Lean Office
        coverage: partial
        confidence: 0.70
        variants:
          - id: waste_scan_8wastes
            name: 8-Wastes scan generator
            source: Internal ForgeMind generator (Lean canonical)
            confidence: 0.70
        boundary_conditions:
          - Value-stream mapping not modeled
        escalate_to: Lean practitioner / Continuous improvement lead

      six_sigma:
        name: Six Sigma (DMAIC / DMADV)
        coverage: partial
        confidence: 0.70
        variants:
          - id: rdmaicsi_extended
            name: RDMAICSI phase generator (DMAIC extended)
            source: Internal ForgeMind generator
            confidence: 0.70
        escalate_to: Six Sigma Black Belt

      theory_of_constraints:
        name: Theory of Constraints (TOC)
        coverage: not_covered
        reason: 5 Focusing Steps, Thinking Processes, Throughput Accounting not modeled
        escalate_to: TOC Jonah / TOC consultant

      kanban_flow:
        name: Kanban / Flow Engineering
        coverage: not_covered
        reason: WIP limits, flow metrics, CFD analytics not modeled
        escalate_to: Kanban practitioner

      itil:
        name: ITIL (IT Service Management)
        coverage: not_covered
        reason: ITIL process catalog (incident, change, problem) not modeled
        escalate_to: ITIL practitioner

  risk_management:
    name: Risk Management
    description: Identification, assessment, treatment and monitoring of risk.
    domains:

      operational_risk:
        name: Operational risk (project-level)
        coverage: partial
        confidence: 0.65
        variants:
          - id: risk_register_generator
            name: Risk register with probability × impact scoring
            source: Internal ForgeMind generator
            confidence: 0.65
        escalate_to: Risk manager / Project risk officer

      enterprise_risk:
        name: Enterprise Risk Management (ERM)
        coverage: not_covered
        reason: COSO ERM framework, risk appetite statements not modeled
        escalate_to: Chief Risk Officer / ERM consultant

      strategic_risk:
        name: Strategic risk (geopolitical, market, reputational)
        coverage: not_covered
        reason: Scenario planning, strategic optionality not modeled
        escalate_to: Strategy consultant

      cyber_risk:
        name: Cybersecurity risk
        coverage: not_covered
        reason: NIST CSF / threat modeling / STRIDE not modeled
        escalate_to: Information security officer

  business_analysis:
    name: Business Analysis & Requirements
    description: Eliciting, modeling and managing requirements.
    domains:

      requirements_engineering:
        name: Requirements engineering (functional/non-functional)
        coverage: partial
        confidence: 0.60
        variants:
          - id: charter_acceptance_criteria
            name: Project charter + acceptance criteria generators
            source: Internal ForgeMind generators
            confidence: 0.60
        escalate_to: Business analyst (BABOK-certified)

      stakeholder_analysis:
        name: Stakeholder analysis & engagement
        coverage: not_covered
        reason: Power/interest grids, salience modeling not deeply modeled
        escalate_to: Business analyst / Change manager

# -----------------------------------------------------------------------------
# Out-of-scope by design — disciplines ForgeMind explicitly will NOT advise on
# until/unless a qualified expert contributes patterns.
# -----------------------------------------------------------------------------
out_of_scope_by_design:

  nuclear_systems:
    reason: Requires NRC / IAEA / national-regulator expertise
    escalate_to: Nuclear systems engineer / Regulator
    rationale: Consequence-of-error too high for generic advice

  defense_classified:
    reason: Requires security clearance and classified-systems expertise
    escalate_to: Defense systems engineer
    rationale: Generic open-source tool cannot operate in classified context

  biomedical_clinical_trials:
    reason: Requires bioethics + FDA/EMA + clinical trial expertise (GCP)
    escalate_to: Clinical research associate / Bioethics committee
    rationale: Human-subjects ethics out of scope for a planning tool

  legal_advice:
    reason: ForgeMind structures planning, does not give legal advice
    escalate_to: Licensed legal counsel
    rationale: Unauthorized practice of law is a regulated activity

  financial_advice_regulated:
    reason: Regulated financial advice requires licensed advisors
    escalate_to: Licensed financial advisor / Compliance officer
    rationale: Securities/banking advice subject to jurisdictional licensing

  medical_diagnosis:
    reason: Diagnosis is the practice of medicine
    escalate_to: Licensed physician
    rationale: Patient harm risk + regulated activity
