  software_engineering:
    name: Software Engineering & DevOps
    description: Patterns for designing, deploying and reverting software systems.
    domains:

      software:
        name: General Software Services (web / microservices / SaaS)
        coverage: partial
        confidence: 0.75
        variants:
          - id: blue_green
            name: Blue/Green deployment with traffic switch rollback
            source: >
              Industry-standard pattern (Fowler — BlueGreenDeployment,
              martinfowler.com/bliki/BlueGreenDeployment.html; Spinnaker
              docs; Argo Rollouts BlueGreen strategy)
            url: https://martinfowler.com/bliki/BlueGreenDeployment.html
            confidence: 0.80
            production_validated: true
            since: "Industry-standard pattern (Fowler, 2010s)"
            scope_evidence: >
              Documented at length by Spinnaker, Argo Rollouts, Flagger;
              widely deployed across SaaS providers
            when_to_choose:
              - You can run two full production environments simultaneously
              - Rollback must be near-instant (load-balancer switch)
              - Workload tolerates a hard cutover between versions
              - You do not need progressive traffic shaping
            pros:
              - Rollback time measured in seconds (LB / DNS switch)
              - No partial-traffic edge cases; either-or semantics
              - Operationally simple; few moving parts
              - Database migrations can be staged with old code reading new schema
            cons:
              - Requires 2x production capacity during a release
              - All-or-nothing exposure — bug surfaces 100% of traffic at switch
              - Database backward-compatibility is the silent failure mode
          - id: canary
            name: Canary deployment with progressive traffic ramp + auto-rollback
            source: >
              Industry-standard pattern (Google SRE Workbook — chapter on
              canarying releases; Netflix Tech Blog on canary analysis;
              Spinnaker Kayenta; Argo Rollouts Canary strategy; Flagger)
            url: https://sre.google/workbook/canarying-releases/
            confidence: 0.75
            production_validated: true
            since: "Industry-standard pattern (Google SRE Workbook, 2018)"
            scope_evidence: >
              Documented by Google SRE, Netflix engineering, and the
              Spinnaker / Argo Rollouts / Flagger open-source ecosystems
            when_to_choose:
              - You can run two versions side-by-side with weighted traffic
              - You want progressive exposure (e.g. 1% → 10% → 50% → 100%)
              - You have SLO-based automated rollback gating
              - Workload is sensitive to a hard cutover (real-time systems, payments)
            pros:
              - Limits blast radius — only a slice of users hit a bad release
              - Enables data-driven release decisions (Kayenta-style analysis)
              - Compatible with feature-flag-based fine-grained control
              - Lower capacity overhead than blue/green
            cons:
              - Slower full-rollout cycle (minutes to hours, not seconds)
              - Requires traffic-shaping infrastructure (service mesh / LB capable of weighting)
              - More moving parts to reason about during incidents
              - Database migrations must be backward-compatible during the canary window
        boundary_conditions:
          - Service-mesh circuit-breaker patterns not modeled
          - Saga / compensating-transaction patterns not modeled
          - Variant choice should be validated against your platform's actual capabilities
        escalate_to: SRE / Platform engineer

      ai_ml:
        name: ML Systems / MLOps
        coverage: partial
        confidence: 0.75
        variants:
          - id: feature_flag_checkpoint
            name: Feature flag + model checkpoint rollback
            source: >
              MLOps community practice (MLflow, Weights & Biases, LaunchDarkly,
              TensorFlow Serving, KServe; canary-style rollout)
            confidence: 0.70
            production_validated: true
            since: "Industry pattern (MLOps community)"
            scope_evidence: >
              Widely deployed across ML platforms with feature-flag rollouts
            when_to_choose:
              - You need a canary-style rollout for the new model
              - Feature flags can route traffic to specific user cohorts
              - Rollback should be instant via flag flip + checkpoint restore
              - You can tolerate a small slice of users seeing the new model
            pros:
              - Familiar pattern reused from web-service canary deployments
              - Granular cohort targeting via feature flags
              - Checkpoint restore is well-supported by MLflow / W&B
              - Rollback time measured in seconds (flag flip)
            cons:
              - The canary slice DOES see the new model — any harm reaches real users
              - Requires a feature-flag service in the inference path
              - Comparing new vs old performance is correlation, not causal
                (different users hit different models)
          - id: shadow_deployment
            name: Shadow deployment — parallel models, only old serves users
            source: >
              Sculley et al., "Hidden Technical Debt in ML Systems"
              (NeurIPS 2015); Sato/Wider/Windheuser, "Continuous Delivery
              for Machine Learning" (martinfowler.com, 2019);
              Netflix Tech Blog on model shadowing
            url: https://martinfowler.com/articles/cd4ml.html
            confidence: 0.75
            production_validated: true
            since: "Industry pattern (Sculley 2015, formalized by 2019)"
            scope_evidence: >
              Widely used at Google, Netflix, Uber and large-scale ML
              platforms; published as canonical MLOps pattern
            when_to_choose:
              - You cannot tolerate ANY user-facing impact from a new model
              - You want to compare new vs old predictions on the SAME input
                (causal A/A comparison, not correlation)
              - You can afford to run two models simultaneously in production
              - Regulatory or trust constraints prohibit unproven model output
            pros:
              - Zero user-facing risk during the shadow phase
              - Direct causal comparison (same input, two predictions)
              - Rollback from Shadow is operationally trivial (turn off the logger)
              - Excellent for high-stakes domains (healthcare, finance, safety)
            cons:
              - Doubles inference cost during the shadow window
              - Doesn't catch UX feedback loops (users never see new predictions)
              - Requires dual-model serving infrastructure
              - Prediction comparison tooling must be built / bought
        boundary_conditions:
          - Model registry-level governance not modeled
          - Drift detection + auto-rollback not modeled
          - Online learning / continual training reversibility not modeled
        escalate_to: ML Engineer / MLOps lead

      embedded_systems:
        name: Embedded / Firmware Systems
