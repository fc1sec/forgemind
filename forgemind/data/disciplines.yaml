# =============================================================================
# ForgeMind — Disciplines Taxonomy
# =============================================================================
#
# This file IS ForgeMind's self-knowledge: the declarative answer to
#   "What can ForgeMind advise on, and what does it know it cannot?"
#
# Every CLI command, generator and validator that produces or rejects advice
# is expected to consult this taxonomy. It is the single source of truth for
# coverage, confidence calibration and escalation routing.
#
# Coverage states:
#   covered      — at least one production-validated variant + tests; outputs
#                  may be classified DETERMINISTIC when grounded in sources.
#   partial      — at least one validated pattern, but known gaps exist; all
#                  outputs are STOCHASTIC and must carry a confidence label.
#   not_covered  — no patterns; ForgeMind MUST escalate to a human expert
#                  and never produce a recommendation in this domain.
#
# When you add or upgrade a plugin/template, ALSO update this file. Coverage
# claims that aren't backed by code are caught by the test suite.
# =============================================================================

version: "1.0"
last_updated: "2026-05-13"

coverage_legend:
  covered: >
    Full pattern library with at least one production-validated variant +
    automated tests. ForgeMind may produce deterministic advice when output
    is grounded in cited sources.
  partial: >
    At least one validated pattern, but known gaps remain. All advice is
    stochastic and must carry an explicit confidence label.
  not_covered: >
    No patterns. ForgeMind must escalate to a human expert and refuse to
    speculate. Out-of-scope by design or pending contribution.

# -----------------------------------------------------------------------------
# Disciplines — top-level fields of expertise
# -----------------------------------------------------------------------------
disciplines:

  quality_management:
    name: Quality Management Systems
    description: >
      Systems for managing quality, compliance, audits, document lifecycles,
      and continuous improvement across regulated and non-regulated industries.
    domains:

      iso9001:
        name: ISO 9001:2015 — General QMS
        coverage: partial
        confidence: 0.85
        variants:
          - id: cespi_unlp_8state
            name: CeSPI UNLP 8-state document lifecycle
            source: iso-gestion (CeSPI UNLP)
            url: https://github.com/Desarrollo-CeSPI/iso-gestion
            license: MIT
            confidence: 0.85
            production_validated: true
            since: "2014"
            scope_evidence: Two ISO 9001:2015 certified scopes, 30+ users, ~3000 records
            when_to_choose:
              - Medium-to-large organization with multiple stakeholders per document
              - Distinct authorities for reviewer vs approver are required
              - 'You need an explicit "In Force" state separate from "Approved" (e.g. effective dates differ from approval dates)'
              - Audit-trail granularity is itself a compliance requirement
            pros:
              - Stronger audit trail (more discrete state transitions logged)
              - Distinct role responsibilities per phase
              - '"In Force" state aligns with regulatory "effective date" practice'
              - Production-validated against real ISO 9001:2015 audits
            cons:
              - Higher ceremony — slower flow for small teams
              - Requires more user training and configuration
              - May feel over-engineered for small/single-author documents
          - id: iso9001_minimalist_5state
            name: Minimalist 5-state document lifecycle
            source: Industry-common simplified QMS pattern (Draft → Under Review → Approved → Signed → Obsolete)
            confidence: 0.70
            production_validated: true
            since: "Industry pattern"
            scope_evidence: Commonly used by small organizations and startups requiring documented QMS without full lifecycle ceremony
            when_to_choose:
              - Small organization or startup with a single QMS owner
              - The same person typically reviews AND approves
              - 'No legal/regulatory need for "In Force" vs "Approved" distinction'
              - Lifecycle ceremony cost outweighs audit-granularity benefit
            pros:
              - Lower ceremony — faster end-to-end lifecycle
              - Easier user training and onboarding
              - Fewer mandatory roles
              - Aligned with the simplest valid §7.5 reading
            cons:
              - Less granular audit trail
              - Hard to scale to multi-stakeholder governance later
              - 'No native modeling of "approved but not yet effective" documents'
        boundary_conditions:
          - Industry-specific extensions (pharma, aerospace, automotive) NOT modeled here
          - Document distribution mechanism (§7.5.3) modeled abstractly only
          - Variant selection should be validated by your organization's QMS lead
        escalate_to: ISO 9001 lead auditor / QMS consultant

      iso13485:
        name: ISO 13485 — Medical Devices QMS
        coverage: not_covered
        reason: >
          Medical device QMS adds design controls, risk management (ISO 14971),
          and FDA/EMA regulatory submission requirements not present in ISO 9001.
        escalate_to: Regulatory affairs specialist (FDA QSR / EU MDR)

      as9100:
        name: AS9100 — Aerospace QMS
        coverage: not_covered
        reason: >
          Aerospace QMS adds counterfeit-parts controls, configuration management,
          and stricter risk management not present in ISO 9001 baseline.
        escalate_to: Aerospace quality engineer

      iatf16949:
        name: IATF 16949 — Automotive QMS
        coverage: not_covered
        reason: >
          Automotive QMS adds APQP, PPAP, FMEA-AIAG/VDA, and customer-specific
          requirements (CSR) workflows not present in ISO 9001 baseline.
        escalate_to: Automotive quality consultant

      iso14001:
        name: ISO 14001 — Environmental Management
        coverage: not_covered
        reason: Environmental aspects/impacts assessment not modeled
        escalate_to: Environmental management consultant

      iso27001:
        name: ISO/IEC 27001 — Information Security Management
        coverage: not_covered
        reason: Annex A controls and risk assessment methodology not modeled
        escalate_to: Information security officer / ISMS consultant

  software_engineering:
    name: Software Engineering & DevOps
    description: Patterns for designing, deploying and reverting software systems.
    domains:

      software:
        name: General Software Services (web / microservices / SaaS)
        coverage: partial
        confidence: 0.75
        variants:
          - id: blue_green
            name: Blue/Green deployment with traffic switch rollback
            source: >
              Industry-standard pattern (Fowler — BlueGreenDeployment,
              martinfowler.com/bliki/BlueGreenDeployment.html; Spinnaker
              docs; Argo Rollouts BlueGreen strategy)
            url: https://martinfowler.com/bliki/BlueGreenDeployment.html
            confidence: 0.80
            production_validated: true
            since: "Industry-standard pattern (Fowler, 2010s)"
            scope_evidence: >
              Documented at length by Spinnaker, Argo Rollouts, Flagger;
              widely deployed across SaaS providers
            when_to_choose:
              - You can run two full production environments simultaneously
              - Rollback must be near-instant (load-balancer switch)
              - Workload tolerates a hard cutover between versions
              - You do not need progressive traffic shaping
            pros:
              - Rollback time measured in seconds (LB / DNS switch)
              - No partial-traffic edge cases; either-or semantics
              - Operationally simple; few moving parts
              - Database migrations can be staged with old code reading new schema
            cons:
              - Requires 2x production capacity during a release
              - All-or-nothing exposure — bug surfaces 100% of traffic at switch
              - Database backward-compatibility is the silent failure mode
          - id: canary
            name: Canary deployment with progressive traffic ramp + auto-rollback
            source: >
              Industry-standard pattern (Google SRE Workbook — chapter on
              canarying releases; Netflix Tech Blog on canary analysis;
              Spinnaker Kayenta; Argo Rollouts Canary strategy; Flagger)
            url: https://sre.google/workbook/canarying-releases/
            confidence: 0.75
            production_validated: true
            since: "Industry-standard pattern (Google SRE Workbook, 2018)"
            scope_evidence: >
              Documented by Google SRE, Netflix engineering, and the
              Spinnaker / Argo Rollouts / Flagger open-source ecosystems
            when_to_choose:
              - You can run two versions side-by-side with weighted traffic
              - You want progressive exposure (e.g. 1% → 10% → 50% → 100%)
              - You have SLO-based automated rollback gating
              - Workload is sensitive to a hard cutover (real-time systems, payments)
            pros:
              - Limits blast radius — only a slice of users hit a bad release
              - Enables data-driven release decisions (Kayenta-style analysis)
              - Compatible with feature-flag-based fine-grained control
              - Lower capacity overhead than blue/green
            cons:
              - Slower full-rollout cycle (minutes to hours, not seconds)
              - Requires traffic-shaping infrastructure (service mesh / LB capable of weighting)
              - More moving parts to reason about during incidents
              - Database migrations must be backward-compatible during the canary window
        boundary_conditions:
          - Service-mesh circuit-breaker patterns not modeled
          - Saga / compensating-transaction patterns not modeled
          - Variant choice should be validated against your platform's actual capabilities
        escalate_to: SRE / Platform engineer

      ai_ml:
        name: ML Systems / MLOps
        coverage: partial
        confidence: 0.75
        variants:
          - id: feature_flag_checkpoint
            name: Feature flag + model checkpoint rollback
            source: >
              MLOps community practice (MLflow, Weights & Biases, LaunchDarkly,
              TensorFlow Serving, KServe; canary-style rollout)
            confidence: 0.70
            production_validated: true
            since: "Industry pattern (MLOps community)"
            scope_evidence: >
              Widely deployed across ML platforms with feature-flag rollouts
            when_to_choose:
              - You need a canary-style rollout for the new model
              - Feature flags can route traffic to specific user cohorts
              - Rollback should be instant via flag flip + checkpoint restore
              - You can tolerate a small slice of users seeing the new model
            pros:
              - Familiar pattern reused from web-service canary deployments
              - Granular cohort targeting via feature flags
              - Checkpoint restore is well-supported by MLflow / W&B
              - Rollback time measured in seconds (flag flip)
            cons:
              - The canary slice DOES see the new model — any harm reaches real users
              - Requires a feature-flag service in the inference path
              - Comparing new vs old performance is correlation, not causal
                (different users hit different models)
          - id: shadow_deployment
            name: Shadow deployment — parallel models, only old serves users
            source: >
              Sculley et al., "Hidden Technical Debt in ML Systems"
              (NeurIPS 2015); Sato/Wider/Windheuser, "Continuous Delivery
              for Machine Learning" (martinfowler.com, 2019);
              Netflix Tech Blog on model shadowing
            url: https://martinfowler.com/articles/cd4ml.html
            confidence: 0.75
            production_validated: true
            since: "Industry pattern (Sculley 2015, formalized by 2019)"
            scope_evidence: >
              Widely used at Google, Netflix, Uber and large-scale ML
              platforms; published as canonical MLOps pattern
            when_to_choose:
              - You cannot tolerate ANY user-facing impact from a new model
              - You want to compare new vs old predictions on the SAME input
                (causal A/A comparison, not correlation)
              - You can afford to run two models simultaneously in production
              - Regulatory or trust constraints prohibit unproven model output
            pros:
              - Zero user-facing risk during the shadow phase
              - Direct causal comparison (same input, two predictions)
              - Rollback from Shadow is operationally trivial (turn off the logger)
              - Excellent for high-stakes domains (healthcare, finance, safety)
            cons:
              - Doubles inference cost during the shadow window
              - Doesn't catch UX feedback loops (users never see new predictions)
              - Requires dual-model serving infrastructure
              - Prediction comparison tooling must be built / bought
        boundary_conditions:
          - Model registry-level governance not modeled
          - Drift detection + auto-rollback not modeled
          - Online learning / continual training reversibility not modeled
        escalate_to: ML Engineer / MLOps lead

      embedded_systems:
        name: Embedded / Firmware Systems
        coverage: not_covered
        reason: >
          Firmware reversibility requires hardware-specific OTA mechanisms,
          dual-bank flash patterns, and safety-critical considerations.
        escalate_to: Embedded systems engineer

      distributed_systems:
        name: Distributed Systems (consensus, replication)
        coverage: not_covered
        reason: >
          Raft/Paxos rollback, eventual-consistency reconciliation and
          partition-tolerance trade-offs not yet modeled.
        escalate_to: Distributed systems architect

  ai_ml:
    name: AI / Machine Learning Systems
    description: Patterns specific to AI agents, LLMs and ML lifecycle.
    domains:

      llm_agents:
        name: LLM-based autonomous agents
        coverage: partial
