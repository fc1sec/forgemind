              (fc1sec/CertOS-SAGA) for ERP / QMS change discipline.
            url: https://github.com/fc1sec/CertOS-SAGA/blob/main/doctrines/30-odoo-pokayoke-patterns.md
            confidence: 0.60
            production_validated: true
            since: "Shingo 1986; CertOS-SAGA operationalization 2026"
            scope_evidence: >
              10 types (Visual, Sequential, Contextual, Conditional, Automatic,
