# =============================================================================
# QMS Change Control — Schema and Workflow Template
# =============================================================================
#
# Derived from the `registro_control_cambios` entity in iso-gestion
# (CeSPI UNLP, MIT licensed), https://github.com/Desarrollo-CeSPI/iso-gestion
#
# Models the change-control record required by ISO 9001:2015 §8.5.6
# ("Control of changes"): every change to a controlled document or record
# must be reviewed, justified, and traceable.
# =============================================================================

entity: change_control_record
domain: iso9001
compliance: ISO 9001:2015 §8.5.6 (Control of changes)
source_attribution:
  project: iso-gestion
  organization: CeSPI UNLP
  url: https://github.com/Desarrollo-CeSPI/iso-gestion
  license: MIT

# -----------------------------------------------------------------------------
# Required fields on every change-control record
# -----------------------------------------------------------------------------
fields:
  id:
    type: integer
    required: true
    description: Unique change-control record identifier

  target_record_id:
    type: foreign_key
    target: registro  # the controlled record being changed
    required: true
    description: The QMS record (or document) the change applies to

  revision:
    type: integer
    required: true
    description: Revision number the change brought the target to

  reason:
    type: text
    required: true
    description: Documented justification for the change (free text)
    iso_reference: "§8.5.6 — reason for change is mandatory"

  actor:
    type: foreign_key
    target: user
    required: true
    description: Person who initiated the change

  date:
    type: timestamp
    required: true
    description: When the change was authorized

  updated_at:
    type: timestamp
    required: true
    auto: on_update
    description: Last modification timestamp (for the change-control record itself)

  evidence_link:
    type: string
    required: false
    description: URL or path to supporting evidence (test result, audit finding, etc.)

# -----------------------------------------------------------------------------
# Workflow — how a change-control record is created and closed
# -----------------------------------------------------------------------------
workflow:
  steps:
    - step: 1
      action: Identify and document the proposed change
      actor_role: requester (any QMS user)
      output: Draft change-control record

    - step: 2
      action: Review change for impact (scope, distribution, compliance)
      actor_role: quality_manager
      output: Risk-assessed change-control record

    - step: 3
      action: Authorize or reject the change
      actor_role: quality_manager
      output: Decision recorded with rationale

    - step: 4
      action: Implement the change on the target record/document
      actor_role: document_author or assigned editor
      output: Target record advances to new revision

    - step: 5
      action: Verify and close the change-control record
      actor_role: quality_manager
      output: Change-control record closed with evidence_link populated

# -----------------------------------------------------------------------------
# Cross-cutting requirements
# -----------------------------------------------------------------------------
requirements:
  - "Every change MUST have a documented reason (§8.5.6)"
  - "The revision counter on the target record MUST increment on each change"
  - "All change-control records MUST be retained per the organization's retention policy"
  - "Reversibility implications of the change MUST be captured (see iso9001_reverse_pattern.yaml)"
  - "Stakeholders on the target record's distribution list MUST be notified of approved changes"

# -----------------------------------------------------------------------------
# Common change categories (used by `motivo` field in iso-gestion)
# -----------------------------------------------------------------------------
change_categories:
  - id: correction
    description: Fix to an error or non-conformance found after release

  - id: improvement
    description: Voluntary improvement based on lessons learned

  - id: regulatory_update
    description: Change required by new or updated regulation/standard

  - id: scope_change
    description: Change in the scope of applicability (e.g. new business unit)

  - id: tool_change
    description: Change driven by tool/system migration or upgrade

  - id: audit_finding
    description: Change driven by internal or external audit finding

  - id: customer_request
    description: Change driven by an external customer/stakeholder request
