# =============================================================================
# ISO 9001:2015 Document Lifecycle — Reverse State Machine
# =============================================================================
#
# Production-validated reference template, derived from:
#   iso-gestion (https://github.com/Desarrollo-CeSPI/iso-gestion)
#   Author: CeSPI UNLP (Universidad Nacional de La Plata, Argentina)
#   License: MIT
#   In production since 2014 across two ISO 9001:2015 certified scopes.
#
# Compliance references:
#   - ISO 9001:2015 §7.5   (Documented information)
#   - ISO 9001:2015 §7.5.3 (Control of documented information / distribution)
#   - ISO 9001:2015 §8.5.2 (Identification and traceability)
#   - ISO 9001:2015 §8.5.6 (Control of changes)
#
# Classification: STOCHASTIC (Empirical) — confidence 0.85
# This template encodes a real production workflow. Verify against your own
# organization's QMS procedures before relying on these reversals.
# =============================================================================

domain: iso9001
framework: ISO 9001:2015 §7.5, §7.5.3, §8.5.2, §8.5.6
description: >
  Document lifecycle reversals with audit trail, validated against a production
  QMS in operation since 2014 with two ISO 9001:2015 certified scopes.
source_attribution:
  project: iso-gestion
  organization: CeSPI UNLP
  url: https://github.com/Desarrollo-CeSPI/iso-gestion
  license: MIT
confidence: 0.85
classification: STOCHASTIC

# -----------------------------------------------------------------------------
# State machine — 8 states, ordered by lifecycle position.
# Each state declares:
#   - spanish_label    : original label from iso-gestion (aids non-Anglophone audits)
#   - can_revert_to    : valid prior states for a reversal
#   - reversible       : whether a reversal is permitted at all
#   - approval_role    : who must authorize the reversal
#   - data_loss        : "none" | "low" | "medium" | "high"
#   - audit_entry      : template for the audit-trail record (per §8.5.2)
#   - mitigation       : alternative path when reversal is not permitted
# -----------------------------------------------------------------------------

state_machine:

  Draft:
    spanish_label: "En proceso de edición"
    can_revert_to: []
    reversible: true
    data_loss: none
    description: Author is drafting the document; not yet locked for review
    audit_entry: null

  Created:
    spanish_label: "Creado"
    can_revert_to: [Draft]
    reversible: true
    data_loss: none
    description: Draft complete, locked, awaiting assignment to a reviewer
    approval_role: document_author
    audit_entry: "Reverted Created → Draft by {actor} on {timestamp} — Reason: {reason}"

  Under Review:
    spanish_label: "En proceso de revisión"
    can_revert_to: [Created, Draft]
    reversible: true
    data_loss: none
    description: Active technical/operational review in progress
    approval_role: document_author
    audit_entry: "Returned Under Review → {target} by {actor} on {timestamp} — Reason: {reason}"

  Reviewed:
    spanish_label: "Revisado"
    can_revert_to: [Under Review]
    reversible: true
    data_loss: none
    description: Review complete, awaiting routing to approval
    approval_role: reviewer
    audit_entry: "Reopened review (Reviewed → Under Review) by {actor} on {timestamp} — Reason: {reason}"

  Under Approval:
    spanish_label: "En proceso de aprobación"
    can_revert_to: [Reviewed, Under Review]
    reversible: true
    data_loss: none
    description: Document being evaluated by approver for sign-off
    approval_role: quality_manager
    audit_entry: "Returned from approval to {target} by {actor} on {timestamp} — Reason: {reason}"

  Approved:
    spanish_label: "Aprobado"
    can_revert_to: [Under Approval, Under Review]
    reversible: true
    data_loss: none
    description: Approved but not yet placed in force (not the active revision)
    approval_role: quality_manager
    audit_entry: "Reverted Approved → {target} by {actor} on {timestamp} — Reason: {reason}"
    mitigation: Triggers re-review cycle and stakeholder notification

  In Force:
    spanish_label: "Vigente"
    can_revert_to: [Approved]
    reversible: true
    data_loss: low
    description: The active, in-effect revision distributed to operations
    approval_role: quality_manager
    audit_entry: "In-force document withdrawn (In Force → Approved) by {actor} on {timestamp} — Change request: {change_id} — Reason: {reason}"
    mitigation: Notify all distribution-list recipients; mark old copies as 'pending revision'
    constraints:
      - Withdrawal requires a formal change request per §8.5.6
      - All distribution-list recipients must be notified per §7.5.3

  Signed:
    spanish_label: "Firmado"
    can_revert_to: []
    reversible: false
    data_loss: none
    description: Legally executed document (historical record)
    reason_not_reversible: >
      Signed documents are historical records per §7.5.3.2 and cannot be unsigned.
      Legal-equivalent of a notarized record.
    mitigation: Issue a new approved revision; mark old version Obsolete with change notice
    audit_entry: "Signed document cannot be reverted"

  Obsolete:
    spanish_label: "Obsoleto"
    can_revert_to: []
    reversible: false
    data_loss: none
    description: Superseded by a newer revision; archived for compliance history
    reason_not_reversible: Obsolete documents are archived per §7.5.3.2 — they remain readable but inactive
    mitigation: Re-issue with a new revision number instead of reactivating an obsolete document
    audit_entry: null

# -----------------------------------------------------------------------------
# Reversibility rules — cross-cutting constraints that apply to ALL reversals
# -----------------------------------------------------------------------------
reversibility_rules:
  - "All reversals MUST be recorded in the audit trail per §8.5.2"
  - "A documented reason MUST accompany every reversal"
  - "Signed documents cannot be reverted — only obsoleted and reissued"
  - "Withdrawing an In-Force document requires a formal change request per §8.5.6"
  - "Distribution-list notification is mandatory when withdrawing controlled documents (§7.5.3)"
  - "Approval role declared per state must authorize the reversal before it takes effect"

# -----------------------------------------------------------------------------
# Approval gates — who must authorize a reversal FROM each state
# -----------------------------------------------------------------------------
approval_gates:
  Draft: null
  Created: document_author
  Under Review: document_author
  Reviewed: reviewer
  Under Approval: quality_manager
  Approved: quality_manager
  In Force: quality_manager
  Signed: null  # Cannot revert
  Obsolete: null  # Cannot revert

# -----------------------------------------------------------------------------
# Time estimates for executing each reversal (in minutes, including audit log)
# -----------------------------------------------------------------------------
time_estimates:
  Created → Draft: 10
  Under Review → Draft: 45
  Under Review → Created: 30
  Reviewed → Under Review: 20
  Under Approval → Reviewed: 35
  Under Approval → Under Review: 35
  Approved → Under Approval: 65
  Approved → Under Review: 70
  In Force → Approved: 75
  Signed → (mitigation, new revision): 90
  Obsolete → (not possible): null

# -----------------------------------------------------------------------------
# Dependencies — what must be in place before a reversal can execute
# -----------------------------------------------------------------------------
dependencies:
  - Document control system with version history
  - Change request / change management process per §8.5.6
  - Distribution list with recipient acknowledgement mechanism (§7.5.3)
  - Audit trail / document log system (§8.5.2)
  - Defined approval authority for each role

# -----------------------------------------------------------------------------
# Roles referenced in approval_role fields
# -----------------------------------------------------------------------------
roles:
  document_author:
    description: The person who drafted or last edited the document
    typical_authority: Edit drafts, request reviews, accept returns from reviewer
  reviewer:
    description: Assigned reviewer who validates technical/operational correctness
    typical_authority: Approve review, return to author, reopen review
  quality_manager:
    description: Person responsible for QMS compliance (often the Quality Director)
    typical_authority: Approve documents, authorize reversals, manage change requests

# -----------------------------------------------------------------------------
# Compliance references
# -----------------------------------------------------------------------------
compliance_references:
  - ISO 9001:2015 §7.5    — Documented information
  - ISO 9001:2015 §7.5.3  — Control of documented information (distribution)
  - ISO 9001:2015 §7.5.3.2 — Retention of records (historical/archived states)
  - ISO 9001:2015 §8.5.2  — Identification and traceability (audit trail)
  - ISO 9001:2015 §8.5.6  — Control of changes (change requests)

# -----------------------------------------------------------------------------
# Example scenarios — concrete reversals for documentation/onboarding
# -----------------------------------------------------------------------------
example_scenarios:
  - scenario: Reviewer requests author corrections
    current_state: Under Review
    target_state: Draft
    action: Reviewer returns document to author with specific corrections
    approval_needed: false
    audit_entry: "Returned Under Review → Draft by {reviewer}. Corrections needed: {list}"

  - scenario: Approver detects compliance gap during approval
    current_state: Under Approval
    target_state: Under Review
    action: Approver returns to reviewer with compliance finding
    approval_needed: true
    approval_role: quality_manager
    audit_entry: "Returned Under Approval → Under Review by {quality_manager}. Finding: {finding}"

  - scenario: In-force document found defective after deployment
    current_state: In Force
    target_state: Approved
    action: File change request, notify all distribution-list recipients, withdraw from circulation
    approval_needed: true
    approval_role: quality_manager
    audit_entry: "Withdrew In Force → Approved. Change request {change_id}. Distribution notified on {date}."

  - scenario: Signed document needs urgent correction
    current_state: Signed
    target_state: Cannot revert
    action: Issue a new approved revision; mark old version Obsolete with change notice
    approval_needed: true
    approval_role: quality_manager
    audit_entry: "Signed document {old_id} superseded by new revision {new_id} on {date}."
